<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billz POS - Kassa Tizimi</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#0b0b0b;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      width:90%;
      max-width:420px;
      background:#111;
      padding:30px;
      border-radius:16px;
      border:1px solid #222;
      text-align:center;
      box-shadow:0 0 25px rgba(255,255,255,0.05);
    }

    h1{
      font-size:24px;
      margin-bottom:10px;
    }

    p{
      color:#aaa;
      font-size:14px;
      line-height:1.5;
    }

    ul{
      text-align:left;
      margin-top:15px;
      padding-left:18px;
      color:#ddd;
      font-size:14px;
    }

    button{
      margin-top:20px;
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:white;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    .form{
      display:none;
      margin-top:15px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:none;
      background:#1a1a1a;
      color:white;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Billz POS</h1>
  <p>
    Do‘koningizni to‘liq avtomatlashtiruvchi kassa tizimi.  
    Savdo, ombor va hisobot — hammasi bir joyda.
  </p>

  <ul>
    <li>📊 Savdoni avtomatik hisoblaydi</li>
    <li>📦 Ombor nazoratini yuritadi</li>
    <li>⚡ Tez va sodda ishlaydi</li>
  </ul>

  <p style="margin-top:10px;color:#888">
    500+ do‘kon allaqachon foydalanmoqda
  </p>

  <button onclick="openForm()">Demo olish</button>

  <div class="form" id="form">
    <input id="name" placeholder="Ismingiz">
    <input id="phone" placeholder="Telefon raqam">
    <button onclick="send()">Yuborish</button>
  </div>
</div>

<script>
function openForm(){
  document.getElementById("form").style.display = "block";
}

function send(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let text =
`🔥 YANGI LEAD (Billz POS)

👤 Ism: ${name}
📞 Telefon: ${phone}`;

  let token = "BOT_TOKEN";
  let chat_id = "CHAT_ID";

  fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);

  alert("Tez orada bog‘lanamiz!");
}
</script>

</body>
</html>
