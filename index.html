<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billz POS - Kassa Tizimi</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0a0a0a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
    }

    .box{
      max-width:400px;
      padding:30px;
    }

    h1{font-size:26px;}
    p{color:#aaa}

    button{
      margin-top:20px;
      padding:15px;
      width:100%;
      border:none;
      border-radius:10px;
      background:white;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    .form{
      display:none;
      margin-top:20px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Do‘koningizni avtomatlashtiring</h1>
  <p>Kassa, savdo va ombor — hammasi bir joyda</p>

  <button onclick="openForm()">📩 Demo olish</button>

  <div class="form" id="form">
    <input id="name" placeholder="Ismingiz">
    <input id="phone" placeholder="Telefon raqam">
    <button onclick="send()">Yuborish</button>
  </div>
</div>

<script>
function openForm(){
  document.getElementById("form").style.display = "block";
}

function send(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let text = `🔥 Yangi Lead\n👤 ${name}\n📞 ${phone}`;

  let token = "BOT_TOKEN";
  let chat_id = "CHAT_ID";

  fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);

  alert("Tez orada bog‘lanamiz!");
}
</script>

</body>
</html>
